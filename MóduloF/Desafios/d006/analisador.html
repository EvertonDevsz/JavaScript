<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Números</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>

    <section>
        <div id="dados">
            <p>
                <label for="valnum">Número (entre 1 e 100):</label>
                <input id="valnum" type="number" name="valnum">

                <input id="adic" type="button" value="Adicionar">
            </p>

            <p>
                <select name="show" id="show" size="2"></select>
            </p>

            <input id="finali" type="button" value="Finalizar">
            <input id="limp" type="button" value="Limpar">
        </div>


        <div id="result"></div>
    </section>

    <footer>
        <p>© CursoEmVídeo</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
