<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>

    <section>
        <div id="dados">
            <p>
                <label for="anonas">Ano de nascimento:</label>
                <input id="anonas" type="number" name="txt" value="0">
            </p>

            <p>
                Sexo:

                <input type="radio" name="sx" id="sxmas" checked>
                <label for="sxmas">Masculino </label>

                <input type="radio" name="sx" id="sxfem">
                <label for="sxfem">Feminino</label >
            </p>

            <input type="button" value="Verificar" onclick="verifAge()">
        </div>


        <div id="res">Preenca os dados acima para ver o resultado</div>
    </section>

    <footer>
        <p>© CursoEmVídeo</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
