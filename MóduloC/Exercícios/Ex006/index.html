<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando números</title>
    <style>
        body{
            font: normal 1.2em Arial;
        }

        input{
            width: 160px;
            margin-bottom: 10px;
            font: normal 1em Arial;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Somando Valores</h1>
    <input type="number" name="txtn1" id="txtn1" placeholder="Digite um valor"> +
    <input type="number" name="txtn2" id="txtn2" placeholder="Digite outro valor">
    <input type="button" value="Somar" onclick="somar()">
    <div id="result"></div>

    <script>
        function somar(){
            let tn1 = Number(document.getElementById("txtn1").value) 
            let tn2 = Number(document.querySelector("input#txtn2").value)
            let soma = tn1 + tn2

            document.getElementById("result").innerHTML = `A soma de ${tn1} e ${tn2} é ${soma}`
        }
    </script>
</body>
</html>
